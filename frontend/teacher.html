<!DOCTYPE html>
<html class="dark" lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O'qituvchi kabineti — Maktab AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0b1326; color: #e2e8f0; }
    .tp-glass { background: rgba(15, 23, 42, 0.92); border: 1px solid rgba(51, 65, 85, 0.6); }
    .material-symbols-outlined { vertical-align: middle; font-size: 20px; }
    .teacher-nav-item { transition: background .15s, color .15s, border-color .15s; }
    .teacher-nav-active {
      background: rgba(16, 185, 129, 0.12);
      color: #6ee7b7;
      border-left: 3px solid #34d399;
      padding-left: calc(0.75rem - 3px);
    }
    .loader {
      border: 3px solid rgba(52, 211, 153, 0.2);
      border-top-color: #34d399;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: tp-spin 0.75s linear infinite;
    }
    @keyframes tp-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen">
  <!-- Yuqori panel: faqat kabinet -->
  <header class="fixed top-0 left-0 right-0 z-50 h-14 flex items-center justify-between px-4 border-b border-slate-800 tp-glass">
    <div class="flex items-center gap-3 min-w-0">
      <span class="material-symbols-outlined text-emerald-400 shrink-0">badge</span>
      <div class="min-w-0">
        <p class="text-sm font-semibold text-white truncate">O'qituvchi kabineti</p>
        <p class="text-[11px] text-slate-500 truncate" id="teacher-welcome">…</p>
      </div>
    </div>
    <div class="flex items-center gap-2 sm:gap-3 text-sm shrink-0">
      <a href="/" class="hidden sm:inline text-slate-400 hover:text-white px-2">O'quvchilar sayti</a>
      <a href="/" class="sm:hidden text-slate-400 hover:text-white p-1" title="Sayt"><span class="material-symbols-outlined">home</span></a>
      <button type="button" id="btn-logout" class="text-red-400 hover:text-red-300 px-2 py-1 rounded-lg hover:bg-red-500/10 text-sm font-medium">Chiqish</button>
    </div>
  </header>

  <div class="flex flex-col md:flex-row pt-14 min-h-screen">
    <!-- Sidebar: faqat o'qituvchi vositalari -->
    <aside class="w-full md:w-56 md:fixed md:left-0 md:top-14 md:bottom-0 border-b md:border-b-0 md:border-r border-slate-800 bg-[#0f172a]/95 md:overflow-y-auto z-40">
      <nav id="teacher-tabs" class="flex md:flex-row flex-row overflow-x-auto gap-1 p-2 md:p-3 md:flex-col md:overflow-x-visible">
        <button type="button" data-tab="dash" class="teacher-nav-item teacher-nav-active whitespace-nowrap text-left w-auto md:w-full px-3 py-2.5 rounded-lg text-sm text-slate-300">Bosh sahifa</button>
        <button type="button" data-tab="tests" class="teacher-nav-item whitespace-nowrap text-left w-auto md:w-full px-3 py-2.5 rounded-lg text-sm text-slate-400 flex items-center gap-2">
          <span class="material-symbols-outlined text-base text-violet-400">auto_awesome</span>Testlar (AI)
        </button>
        <button type="button" data-tab="students" class="teacher-nav-item whitespace-nowrap text-left w-auto md:w-full px-3 py-2.5 rounded-lg text-sm text-slate-400">O'quvchilar</button>
        <button type="button" data-tab="att" class="teacher-nav-item whitespace-nowrap text-left w-auto md:w-full px-3 py-2.5 rounded-lg text-sm text-slate-400">Davomat</button>
        <button type="button" data-tab="att-hist" class="teacher-nav-item whitespace-nowrap text-left w-auto md:w-full px-3 py-2.5 rounded-lg text-sm text-slate-400">Davomat tarixi</button>
        <button type="button" data-tab="journal" class="teacher-nav-item whitespace-nowrap text-left w-auto md:w-full px-3 py-2.5 rounded-lg text-sm text-slate-400">Journal (qo'lda)</button>
        <button type="button" data-tab="hw" class="teacher-nav-item whitespace-nowrap text-left w-auto md:w-full px-3 py-2.5 rounded-lg text-sm text-slate-400">Vazifalar</button>
      </nav>
    </aside>

    <main class="flex-1 md:ml-56 p-4 md:p-6 pb-24" id="main">
      <div class="flex justify-center py-24"><div class="loader"></div></div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/teacher-panel.js"></script>
  <script>
    (async function () {
      if (!await TeacherPanel.ensureGate()) return;
      var me = Auth.getUser();
      TeacherPanel.start({
        main: document.getElementById('main'),
        tabs: document.getElementById('teacher-tabs'),
        welcome: document.getElementById('teacher-welcome'),
        user: me
      });
      document.getElementById('btn-logout').onclick = function () { Auth.logout(); };
    })();
  </script>
</body>
</html>
